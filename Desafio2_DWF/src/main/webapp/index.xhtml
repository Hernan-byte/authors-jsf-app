<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://xmlns.jcp.org/jsf/passthrough">

    <h:head>
        <title>Directorio de Autores</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" />
        <h:outputStylesheet library="css" name="estilos.css" />
    </h:head>

    <h:body>
        <div class="container">
            <h1 class="titulo-principal">Directorio de Autores</h1>

            <div class="panel panel-default panel-custom">
                <div class="panel-heading panel-heading-custom">FORMULARIO DE AUTORES</div>
                <div class="panel-body">
                    <h:form id="formRegistro">
                        <div class="form-group">
                            <h:outputLabel value="Nombre del Autor:" />
                            <h:inputText value="#{authorBean.author.nombre}" styleClass="form-control" p:placeholder="Nombre" />
                        </div>

                        <div class="form-group">
                            <h:outputLabel value="Fecha de Nacimiento" />
                            <h:inputText value="#{authorBean.author.fechaNacimiento}" styleClass="form-control" p:placeholder="Fecha nacimiento">
                                <f:convertDateTime pattern="dd/MM/yyyy" />
                            </h:inputText>
                        </div>

                        <div class="form-group">
                            <h:outputLabel value="Teléfono" />
                            <h:inputText value="#{authorBean.author.telefono}" styleClass="form-control" p:placeholder="Número telefónico" />
                        </div>

                        <div class="form-group">
                            <h:outputLabel value="Género" />
                            <h:selectOneMenu value="#{authorBean.author.idGenero}" styleClass="form-control">
                                <f:selectItem itemLabel="Select" itemValue="" />
                                <f:selectItems value="#{literaryGenreBean.listaGeneros}" var="g" 
                                               itemLabel="#{g.nombre}" itemValue="#{g.id}" />
                            </h:selectOneMenu>
                        </div>

                        <div class="text-center">
                            <h:commandButton value="AGREGAR" action="#{authorBean.guardar}" styleClass="btn-dark-custom">
                                <f:ajax execute="@form" render="formTabla msgsValidacion" />
                            </h:commandButton>
                        </div>

                        <div class="validaciones-seccion">
                            <h:outputLabel value="Validaciones" />
                            <h:panelGroup id="msgsValidacion" layout="block" styleClass="validation-container">
                                <h:messages globalOnly="false" style="color:red; list-style:none;" />
                            </h:panelGroup>
                        </div>
                    </h:form>
                </div>
            </div>

            <h:form id="formTabla">
                <div class="row" style="margin-bottom: 10px;">
                    <div class="col-xs-6">
                        <h3 class="subtitulo-tabla">DIRECTORIO DE AUTORES</h3>
                    </div>
                    <div class="col-xs-6 text-right">
                        <h:selectOneMenu value="#{authorBean.filtroGenero}" styleClass="filtro-genero">
                            <f:selectItem itemLabel="Género" itemValue="" />
                            <f:ajax render="tablaAutores" />
                        </h:selectOneMenu>
                    </div>
                </div>

                <h:dataTable id="tablaAutores" value="#{authorBean.listaAutores}" var="item" 
                             styleClass="table table-bordered table-custom">
                    <h:column><f:facet name="header">ID Autor</f:facet>#{item.id}</h:column>
                    <h:column><f:facet name="header">Nombre Autor</f:facet>#{item.nombre}</h:column>
                    <h:column><f:facet name="header">Teléfono</f:facet>#{item.telefono}</h:column>
                    <h:column>
                        <f:facet name="header">Fecha Nacimiento</f:facet>
                        <h:outputText value="#{item.fechaNacimiento}"><f:convertDateTime pattern="dd/MM/yyyy" /></h:outputText>
                    </h:column>
                    <h:column><f:facet name="header">Género Literario</f:facet>#{item.genero.nombre}</h:column>
                    <h:column>
                        <f:facet name="header">Operaciones</f:facet>
                        <div class="text-center">
                            <h:commandButton value="EDITAR" action="#{authorBean.editar(item)}" styleClass="btn-op" />
                            <h:commandButton value="BORRAR" action="#{authorBean.eliminar(item.id)}" styleClass="btn-op">
                                <f:ajax render="tablaAutores" />
                            </h:commandButton>
                        </div>
                    </h:column>
                </h:dataTable>

                <div class="text-right" style="margin-top:10px;">
                    <h:outputText value="Número de autores: #{authorBean.listaAutores.size()}" styleClass="footer-text" />
                    <h:commandButton value="CONTAR" styleClass="btn-dark-custom" />
                </div>
            </h:form>
        </div>
    </h:body>
</ui:composition>
